<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <div class="navbar">
        <h1>Admin Panel</h1>
        <div class="nav-links">
            <span id="adminName"></span>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>

    <div class="admin-container">

        <!-- Stats -->
        <div class="admin-stats">
            <div class="stat-card">
                <h3 id="totalUsers">0</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h3 id="totalPosts">0</h3>
                <p>Total Posts</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('users', this)">Users</button>
            <button class="tab-btn" onclick="switchTab('posts', this)">Posts</button>
        </div>

        <!-- Users Table -->
        <div id="usersSection">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>City</th>
                        <th>Posts</th>
                        <th>Followers</th>
                        <th>Joined</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>

        <!-- Posts Table -->
        <div id="postsSection" style="display:none;">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Content</th>
                        <th>Likes</th>
                        <th>Comments</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="postsTable"></tbody>
            </table>
        </div>

    </div>

    <script src="../js/admin.js"></script>

</body>
</html>
