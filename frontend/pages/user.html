<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>

    <div class="navbar">
        <h1>SocialMedia</h1>
        <div class="nav-links">
            <a href="feed.html">Feed</a>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>

    <div class="profile-container">

        <!-- Profile Info -->
        <div class="profile-card">
            <div class="profile-pic-wrapper">
                <img id="profilePic" src="../images/default.png" alt="Profile Picture">
            </div>
            <div class="profile-info">
                <h2 id="profileUsername"></h2>
                <p id="profileFullName"></p>
                <p id="profileBio"></p>
                <p id="profileCity"></p>
                <div class="profile-stats">
                    <span><strong id="postCount">0</strong> Posts</span>
                    <span><strong id="followerCount">0</strong> Followers</span>
                    <span><strong id="followingCount">0</strong> Following</span>
                </div>
                <button id="followBtn" onclick="toggleFollow()">Follow</button>
            </div>
        </div>

        <!-- User Posts -->
        <div class="profile-posts">
            <h3>Posts</h3>
            <div id="userPosts"></div>
        </div>

        <!-- User Albums -->
        <div class="profile-albums">
            <h3>Albums</h3>
            <div id="userAlbums"></div>
        </div>

    </div>

    <script src="../js/user.js"></script>

</body>
</html>
